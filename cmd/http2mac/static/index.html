<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<title>http2mac — MAC Address Lookup</title>
<style>
  :root{
    --bg:#0a0e14;--surface:#0f1520;--border:#1e2d45;--border-hi:#2a4060;
    --accent:#00e5a0;--accent2:#00b07a;--accent-dim:#003d28;
    --text:#c8d8e8;--text-dim:#4a6480;--text-mid:#7a9ab8;
    --ok:#00d48a;--ok-dim:#003d28;--warn:#ffb340;--warn-dim:#3d2a00;
    --err:#ff4e6a;--err-dim:#3d0010;
    --reg:#00e5a0;--reg-dim:#003d28;--noreg:#4a6480;--noreg-dim:#0a0e14;
    --uni:#00c8ff;--uni-dim:#003a52;--multi:#ff9000;--multi-dim:#3d2400;
    --grid-a:rgba(30,45,69,.30);--grid-b:rgba(30,45,69,.15);
    --radial:rgba(0,229,160,.07);--panel-tint:rgba(0,229,160,.04);
    --sel-bg:#0f1520;--raw-bg:#070b10;--ring:#00e5a0;
    --mono:'Courier New','Lucida Console',monospace;
    --sans:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;
  }
  [data-theme="light"]{
    --bg:#eef3f9;--surface:#fff;--border:#c8d8ec;--border-hi:#a0bcd8;
    --accent:#007a50;--accent2:#005538;--accent-dim:#d0f0e4;
    --text:#152030;--text-dim:#7898b8;--text-mid:#3a6080;
    --ok:#006e48;--ok-dim:#d0f0e4;--warn:#8c5200;--warn-dim:#fff0d0;
    --err:#b0002a;--err-dim:#fde8ef;
    --reg:#007a50;--reg-dim:#d0f0e4;--noreg:#888898;--noreg-dim:#eef3f9;
    --uni:#005278;--uni-dim:#d4eaf8;--multi:#8c4500;--multi-dim:#fff0d0;
    --grid-a:rgba(150,190,225,.28);--grid-b:rgba(150,190,225,.14);
    --radial:rgba(0,160,100,.06);--panel-tint:rgba(0,160,100,.04);
    --sel-bg:#fff;--raw-bg:#f4f8fc;--ring:#005538;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  .skip-link{position:absolute;top:-100px;left:16px;z-index:9999;background:var(--accent);color:var(--bg);font-family:var(--mono);font-size:.85rem;font-weight:700;padding:10px 18px;border-radius:0 0 6px 6px;text-decoration:none;letter-spacing:.08em;transition:top .2s}
  .skip-link:focus{top:0;outline:3px solid var(--ring);outline-offset:2px}
  :focus-visible{outline:2px solid var(--ring);outline-offset:3px;border-radius:3px}
  :focus:not(:focus-visible){outline:none}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 60px;
    background-image:radial-gradient(ellipse 80% 40% at 50% -10%,var(--radial) 0%,transparent 70%),repeating-linear-gradient(0deg,transparent,transparent 39px,var(--grid-a) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,var(--grid-b) 40px);
    transition:background .3s,color .3s}
  header{width:100%;max-width:960px;padding:32px 0 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);margin-bottom:32px;transition:border-color .3s}
  .logo-mac{width:42px;height:42px;flex-shrink:0}
  .logo-mac .node{fill:none;stroke:var(--accent);stroke-width:1.6;transition:stroke .3s}
  .logo-mac .core{fill:var(--accent);opacity:.9;transition:fill .3s}
  .logo-mac .link{stroke:var(--accent);stroke-width:1.2;opacity:.6;transition:stroke .3s}
  .header-text h1{font-family:var(--mono);font-size:1.05rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);transition:color .3s}
  .header-text p{font-size:.68rem;color:var(--text-dim);letter-spacing:.07em;text-transform:uppercase;margin-top:3px;transition:color .3s}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .theme-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;border:1px solid var(--border);background:transparent;border-radius:20px;padding:5px 11px 5px 8px;transition:border-color .2s,background .2s,color .2s;color:var(--text-dim)}
  .theme-toggle:hover,.theme-toggle:focus-visible{border-color:var(--accent2);background:var(--accent-dim);color:var(--accent)}
  .theme-icon{font-size:.85rem;line-height:1;transition:transform .4s}
  .theme-toggle:hover .theme-icon{transform:rotate(20deg)}
  .theme-track{width:28px;height:15px;background:var(--border);border-radius:8px;position:relative;flex-shrink:0;transition:background .3s}
  .theme-thumb{position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:var(--text-dim);transition:transform .3s,background .3s}
  [data-theme="light"] .theme-track{background:var(--accent2)}
  [data-theme="light"] .theme-thumb{background:#fff;transform:translateX(13px)}
  .theme-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
  .lang-wrap{position:relative;display:flex;align-items:center}
  .lang-sel{appearance:none;-webkit-appearance:none;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;padding:5px 26px 5px 10px;cursor:pointer;outline:none;transition:border-color .2s,background .2s,color .2s}
  .lang-sel:hover,.lang-sel:focus-visible{border-color:var(--accent2);background:var(--accent-dim);color:var(--accent);outline:2px solid var(--ring);outline-offset:2px}
  .lang-sel option{background:var(--sel-bg);color:var(--text)}
  .lang-arr{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-dim);font-size:.55rem}
  main{width:100%;max-width:960px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:20px;transition:background .3s,border-color .3s}
  .panel-head{padding:10px 18px;background:var(--panel-tint);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.66rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);transition:background .3s,border-color .3s,color .3s}
  .panel-head::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px;flex-shrink:0;transition:background .3s}
  .panel-body{padding:20px 22px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  label{font-family:var(--mono);font-size:.63rem;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--text-dim);cursor:pointer}
  input,textarea{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:.85rem;padding:9px 12px;outline:none;width:100%;transition:border-color .2s,box-shadow .2s,background .3s,color .3s;min-height:44px}
  input:focus-visible,textarea:focus-visible{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(0,229,160,.18);outline:none}
  input[aria-invalid="true"],textarea[aria-invalid="true"]{border-color:var(--err);box-shadow:0 0 0 2px rgba(255,78,106,.2)}
  input::placeholder,textarea::placeholder{color:var(--text-dim)}
  textarea{resize:vertical;min-height:100px;line-height:1.6}
  .mac-tabs{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:12px;width:fit-content;transition:border-color .3s}
  .mac-tab{padding:7px 15px;font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--text-dim);transition:all .18s;user-select:none;min-height:44px}
  .mac-tab[aria-selected="true"]{background:var(--accent-dim);color:var(--accent)}
  .mac-tab:hover:not([aria-selected="true"]){background:var(--panel-tint);color:var(--text-mid)}
  .mac-tab:focus-visible{outline:2px solid var(--ring);outline-offset:-2px;z-index:1}
  .mac-pane{display:none}.mac-pane.active{display:block}
  .mac-hint{margin-top:6px;font-family:var(--mono);font-size:.63rem;color:var(--text-dim)}
  .submit-row{margin-top:22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .btn-submit{display:flex;align-items:center;gap:9px;background:var(--accent-dim);border:1px solid var(--accent2);color:var(--accent);font-family:var(--mono);font-size:.78rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:10px 26px;border-radius:4px;cursor:pointer;position:relative;overflow:hidden;transition:background .2s,box-shadow .2s,border-color .3s,color .3s;min-height:44px}
  .btn-submit::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,229,160,.12),transparent);transform:translateX(-100%);transition:transform .4s}
  .btn-submit:hover::before{transform:translateX(100%)}
  .btn-submit:hover{box-shadow:0 0 20px rgba(0,176,122,.25);filter:brightness(1.08)}
  .btn-submit:active{transform:scale(.98)}.btn-submit:disabled{opacity:.4;cursor:not-allowed}
  .btn-submit:focus-visible{outline:3px solid var(--ring);outline-offset:3px}
  .spinner{display:none;width:16px;height:16px;border:2px solid rgba(0,229,160,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  .loading .spinner{display:block}.loading .send-icon{display:none}
  .query-hint{font-family:var(--mono);font-size:.67rem;color:var(--text-dim)}
  #results-panel{display:none}
  .result-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .badge{font-family:var(--mono);font-size:.63rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:3px}
  .badge-reg{background:var(--reg-dim);color:var(--reg);border:1px solid var(--reg)}
  .badge-noreg{background:var(--noreg-dim);color:var(--noreg);border:1px solid var(--noreg)}
  .badge-error{background:var(--err-dim);color:var(--err);border:1px solid var(--err)}
  .badge-valid{background:var(--ok-dim);color:var(--ok);border:1px solid var(--ok)}
  .badge-invalid{background:var(--err-dim);color:var(--err);border:1px solid var(--err)}
  .badge-uni{background:var(--uni-dim);color:var(--uni);border:1px solid var(--uni)}
  .badge-multi{background:var(--multi-dim);color:var(--multi);border:1px solid var(--multi)}
  .badge-uaa{background:var(--uni-dim);color:var(--uni);border:1px solid var(--uni)}
  .badge-laa{background:var(--warn-dim);color:var(--warn);border:1px solid var(--warn)}
  .result-query-str{font-family:var(--mono);font-size:.72rem;color:var(--text-mid)}
  .result-time{margin-left:auto;font-family:var(--mono);font-size:.67rem;color:var(--text-dim)}
  .btn-copy{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-family:var(--mono);font-size:.63rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:4px 11px;cursor:pointer;white-space:nowrap;transition:border-color .2s,background .2s,color .2s;min-height:28px}
  .btn-copy:hover{border-color:var(--accent2);background:var(--accent-dim);color:var(--accent)}
  .btn-copy.copied{border-color:var(--ok);color:var(--ok);background:var(--ok-dim)}
  .mac-table-wrap{overflow-x:auto}
  .mac-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:.8rem}
  .mac-table thead tr{border-bottom:1px solid var(--border-hi)}
  .mac-table th{text-align:left;padding:6px 12px 8px;font-size:.6rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);white-space:nowrap}
  .mac-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;transition:background .15s}
  .mac-table tr:last-child td{border-bottom:none}
  .mac-table tr:hover td{background:var(--panel-tint)}
  .mac-table tr.row-detail:hover td{background:var(--panel-tint)}
  .row-detail td{padding:0 12px 8px;border-bottom:1px solid var(--border);background:inherit}
  .row-detail:last-child td{border-bottom:none}
  .detail-line{font-size:.68rem;color:var(--text-dim);font-family:var(--mono);display:flex;flex-wrap:wrap;gap:0 18px;padding-top:0}
  .detail-seg{white-space:nowrap}.detail-lbl{color:var(--text-dim);margin-right:3px}.detail-val{color:var(--text-mid)}
  .td-mac{font-weight:600;color:var(--accent);white-space:nowrap}
  .td-mac.noreg{color:var(--noreg)}
  .td-mac.invalid{color:var(--err)}
  .cell-main{display:block}.cell-sub{display:block;margin-top:2px;font-size:.66rem;color:var(--text-dim)}
  .cell-main.accent{color:var(--accent)}.cell-main.muted{color:var(--text-mid)}
  .td-noreg-msg{color:var(--noreg);font-size:.75rem;opacity:.8}
  .td-invalid-msg{color:var(--err);font-size:.75rem;opacity:.8}
  .assign-pill{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
  .assign-MA-L{background:rgba(0,229,160,.12);color:#00e5a0;border:1px solid rgba(0,229,160,.3)}
  .assign-MA-M{background:rgba(0,200,255,.12);color:#00c8ff;border:1px solid rgba(0,200,255,.3)}
  .assign-MA-S{background:rgba(180,120,255,.12);color:#b478ff;border:1px solid rgba(180,120,255,.3)}
  .assign-CID{background:rgba(255,179,64,.12);color:#ffb340;border:1px solid rgba(255,179,64,.3)}
  .assign-IAB{background:rgba(255,100,60,.12);color:#ff643c;border:1px solid rgba(255,100,60,.3)}
  .virtual-chip{font-size:.65rem;padding:2px 7px;border-radius:2px;background:var(--panel-tint);border:1px solid var(--border);color:var(--text-mid);white-space:nowrap;display:inline-block}
  .virtual-chip.is-virtual{border-color:rgba(255,179,64,.4);color:#ffb340}
  .raw-block{background:var(--raw-bg);border:1px solid var(--border);border-radius:4px;padding:14px 16px;font-family:var(--mono);font-size:.78rem;color:var(--text-mid);white-space:pre-wrap;word-break:break-all;line-height:1.7}
  .stats-bar{display:flex;gap:20px;padding:12px 22px;flex-wrap:wrap;border-top:1px solid var(--border);font-family:var(--mono);font-size:.68rem;color:var(--text-dim);background:var(--panel-tint)}
  .stat-item{display:flex;align-items:center;gap:6px}
  .stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .stat-dot.registered{background:#00e5a0}.stat-dot.unicast{background:#00c8ff}
  .stat-dot.multicast{background:#ff9000}.stat-dot.invalid{background:#ff4e6a}
  .stat-dot.noreg{background:var(--noreg)}
  .visually-hidden{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
  footer{margin-top:48px;font-family:var(--mono);font-size:.6rem;color:var(--text-dim);letter-spacing:.08em;text-align:center;opacity:.45}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  @media(max-width:600px){.theme-label{display:none}}
  [dir="rtl"] .header-right{margin-left:0;margin-right:auto}
  [dir="rtl"] .lang-arr{right:auto;left:8px}
  [dir="rtl"] .lang-sel{padding:5px 10px 5px 26px}
  [dir="rtl"] .result-time{margin-left:0;margin-right:auto}
  [dir="rtl"] .panel-head::before{margin-right:0;margin-left:10px}
  [dir="rtl"] .mac-table th,[dir="rtl"] .mac-table td{text-align:right}
  [dir="rtl"] .skip-link{left:auto;right:16px}
  [dir="rtl"] .btn-submit::before{background:linear-gradient(270deg,transparent,rgba(0,229,160,.10),transparent)}
</style>
</head>

<header role="banner">

<script>
// ══════════════════════════════════════════════════════════
// I18N — 15 LANGUAGES

const SUPPORTED=Object.keys(LANGS);
function detectLang(){
  for(const l of(navigator.languages||[navigator.language||'en'])){
    if(SUPPORTED.includes(l))return l;
    const b=l.split('-')[0];
    const m=SUPPORTED.find(s=>s===b||s.startsWith(b+'-'));
    if(m)return m;
  }
  return'en';
}

// ── THEME ──────────────────────────────────────────────────────────
const html=document.documentElement;
const themeBtn=document.getElementById('theme-toggle');
const themeLbl=document.getElementById('theme-label');
const themeIcon=document.getElementById('theme-icon');
let currentLang='en',isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
applyTheme(isDark);
themeBtn.addEventListener('click',()=>{isDark=!isDark;applyTheme(isDark)});
function applyTheme(dark){
  html.dataset.theme=dark?'dark':'light';
  themeBtn.setAttribute('aria-checked',dark?'false':'true');
  const t=LANGS[currentLang]||LANGS.en;
  themeLbl.textContent=dark?t.themeLight:t.themeDark;
  themeIcon.textContent=dark?'☀️':'🌙';
}

// ── LANGUAGE ───────────────────────────────────────────────────────
function applyLang(lang){
  currentLang=lang;
  const t=LANGS[lang]||LANGS.en;
  const dir=t.dir||'ltr';
  html.lang=lang;html.dir=dir;document.body.dir=dir;
  document.getElementById('skip-link').textContent=t.skipLink||'Skip to main content';
  document.getElementById('hdr-subtitle').textContent=t.subtitle;
  document.getElementById('ph-params').textContent=t.panelParams;
  document.getElementById('lbl-mac-mode').textContent=t.labelMacMode;
  document.getElementById('tab-single').textContent=t.tabSingle;
  document.getElementById('tab-multi').textContent=t.tabMulti;
  document.getElementById('mac-single').placeholder=t.placeholderSingle;
  document.getElementById('mac-multi').placeholder=t.placeholderMulti;
  document.getElementById('mac-single-hint').textContent=t.hintSingle;
  document.getElementById('mac-multi-hint').textContent=t.hintMulti;
  document.getElementById('btn-send-label').textContent=t.btnSend;
  document.getElementById('ph-results').textContent=t.panelResults;
  document.getElementById('lang-sel-lbl').textContent=dir==='rtl'?'اللغة':'Language';
  applyTheme(isDark);
}

const langSel=document.getElementById('lang-sel');
const initLang=detectLang();
langSel.value=SUPPORTED.includes(initLang)?initLang:'en';
applyLang(langSel.value);
langSel.addEventListener('change',()=>applyLang(langSel.value));

// ── TABS ───────────────────────────────────────────────────────────
let activeTab='single';
const macTabs=Array.from(document.querySelectorAll('.mac-tab'));
macTabs.forEach(b=>{
  b.addEventListener('click',()=>activateTab(b.dataset.tab,b));
  b.addEventListener('keydown',e=>{
    let i=macTabs.indexOf(e.currentTarget);
    const dir=html.dir==='rtl'?-1:1;
    if(e.key==='ArrowRight'){e.preventDefault();macTabs[(i+dir+macTabs.length)%macTabs.length].focus()}
    if(e.key==='ArrowLeft'){e.preventDefault();macTabs[(i-dir+macTabs.length)%macTabs.length].focus()}
  });
});
function activateTab(id,btn){
  activeTab=id;
  macTabs.forEach(b=>{b.setAttribute('aria-selected','false');b.tabIndex=-1});
  document.querySelectorAll('.mac-pane').forEach(p=>{p.classList.remove('active');p.hidden=true});
  btn.setAttribute('aria-selected','true');btn.tabIndex=0;
  const p=document.getElementById('pane-'+id);p.classList.add('active');p.hidden=false;
}
function parseMACs(r){return r.split(/[\n,\s]+/).map(s=>s.trim()).filter(Boolean)}
function getMACs(){
  if(activeTab==='single'){const v=document.getElementById('mac-single').value.trim();return v?[v]:[]}
  return parseMACs(document.getElementById('mac-multi').value);
}

// ── SUBMIT ─────────────────────────────────────────────────────────
const macForm=document.getElementById('mac-form'),btn=document.getElementById('btn-query'),
      hint=document.getElementById('query-hint'),srStatus=document.getElementById('sr-status');
macForm.addEventListener('submit',async e=>{
  e.preventDefault();
  const t=LANGS[currentLang]||LANGS.en;
  const macs=getMACs();
  const ai=activeTab==='single'?document.getElementById('mac-single'):document.getElementById('mac-multi');
  if(!macs.length){ai.focus();ai.setAttribute('aria-invalid','true');hint.textContent=t.warnNoMac;hint.style.color='var(--warn)';hint.setAttribute('role','alert');return}
  ai.setAttribute('aria-invalid','false');hint.textContent='';hint.removeAttribute('role');
  const payload=macs.length===1?{mac:macs[0]}:{macs};
  btn.disabled=true;btn.classList.add('loading');btn.setAttribute('aria-busy','true');srStatus.textContent=t.loadingLabel;
  const t0=performance.now();
  try{
    const res=await fetch('/api/v1/mac',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const elapsed=((performance.now()-t0)/1000).toFixed(2);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();renderResults(data,macs,elapsed);srStatus.textContent=t.resultsReady(macs.length);
  }catch(err){renderError(err,macs,((performance.now()-t0)/1000).toFixed(2));srStatus.textContent=String(err)}
  finally{btn.disabled=false;btn.classList.remove('loading');btn.removeAttribute('aria-busy')}
});
document.getElementById('mac-single').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();macForm.requestSubmit()}});

// ── RENDER ─────────────────────────────────────────────────────────
let lastAnswers=[],lastMACs=[];
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function renderResults(data,macs,elapsed){
  const panel=document.getElementById('results-panel'),body=document.getElementById('results-body'),stats=document.getElementById('stats-bar');
  const t=LANGS[currentLang]||LANGS.en;panel.style.display='block';
  if((data.status||'').toUpperCase()==='ERROR'){
    lastAnswers=[];lastMACs=[];
    body.innerHTML=`<div class="result-meta"><span class="badge badge-error">${t.errBadge}</span><span class="result-query-str">${esc(macs.join(', '))}</span><span class="result-time">${elapsed}s</span></div><div class="raw-block" role="alert" style="color:var(--err)">${esc(JSON.stringify(data,null,2))}</div>`;
    stats.style.display='none';finalize(panel);return;
  }
  const ansMap={};(data.answers||[]).forEach(a=>{if(a.mac)ansMap[a.mac.toLowerCase()]=a});
  // Also index by original input
  (data.answers||[]).forEach((a,i)=>{if(i<macs.length)ansMap['__input_'+i]=a});
  lastMACs=macs;lastAnswers=data.answers||[];
  const regCount=(data.answers||[]).filter(a=>a.registered).length;
  const qStr=macs.length===1?macs[0]:`${macs.length} MACs`;
  const oBadge=regCount>0?`<span class="badge badge-reg">${t.labelRegistered}</span>`:`<span class="badge badge-noreg">${t.labelUnregistered}</span>`;
  let rows='';(data.answers||[]).forEach((a,i)=>{rows+=buildRow(a,macs[i]||a.mac,t)});
  body.innerHTML=`<div class="result-meta">${oBadge}<span class="result-query-str">${esc(qStr)}</span><span class="result-time">${elapsed}s · ${t.replyCount(macs.length)}</span><button class="btn-copy" id="btn-csv" type="button"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span id="csv-label">${esc(t.btnCopy)}</span></button></div><div class="mac-table-wrap"><table class="mac-table" aria-label="${esc(t.panelResults)}"><caption class="visually-hidden">${esc(t.panelResults)}</caption><thead><tr><th>${esc(t.colMAC)}</th><th>${esc(t.colValid)}</th><th>${esc(t.colType)}</th><th>${esc(t.colAdminType)}</th><th>${esc(t.colRegistered)}</th><th>${esc(t.colOrg)}</th><th>${esc(t.colCountry)}</th><th>${esc(t.colAssignment)}</th><th>${esc(t.colVirtual)}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  document.getElementById('btn-csv').addEventListener('click',copyCSV);
  const c={registered:0,unicast:0,multicast:0,invalid:0,noreg:0};
  (data.answers||[]).forEach(a=>{
    if(!a.valid){c.invalid++;return}
    if(a.type==='Unicast')c.unicast++;else if(a.type==='Multicast')c.multicast++;
    if(a.registered)c.registered++;else c.noreg++;
  });
  const sp=[];
  if(c.registered)sp.push(`<span class="stat-item"><span class="stat-dot registered"></span>${c.registered} ${esc(t.statRegistered)}</span>`);
  if(c.noreg)sp.push(`<span class="stat-item"><span class="stat-dot noreg"></span>${c.noreg} ${esc(t.statUnregistered)}</span>`);
  if(c.unicast)sp.push(`<span class="stat-item"><span class="stat-dot unicast"></span>${c.unicast} ${esc(t.statUnicast)}</span>`);
  if(c.multicast)sp.push(`<span class="stat-item"><span class="stat-dot multicast"></span>${c.multicast} ${esc(t.statMulticast)}</span>`);
  if(c.invalid)sp.push(`<span class="stat-item"><span class="stat-dot invalid"></span>${c.invalid} ${esc(t.statInvalid)}</span>`);
  stats.innerHTML=sp.join('');stats.style.display=sp.length?'flex':'none';finalize(panel);
}

function assignPill(assignment){
  if(!assignment)return'—';
  const k=assignment.replace(/[^A-Za-z0-9-]/g,'');
  return`<span class="assign-pill assign-${esc(k)}">${esc(assignment)}</span>`;
}

function virtualChip(v){
  if(!v||v==='')return'—';
  const isVirt=v.toLowerCase()!=='false';
  return`<span class="virtual-chip${isVirt?' is-virtual':''}">${esc(isVirt?v:'—')}</span>`;
}

function buildRow(a,inputMAC,t){
  if(!a.valid){
    return`<tr><td class="td-mac invalid">${esc(inputMAC)}</td><td><span class="badge badge-invalid">${t.labelInvalid}</span></td><td>—</td><td>—</td><td>—</td><td colspan="4" class="td-invalid-msg">⊘ &nbsp;${esc(t.invalidMsg)}</td></tr>`;
  }
  const macDisplay=a.mac||esc(inputMAC);
  const macClass=a.registered?'td-mac':'td-mac noreg';
  const validBadge=`<span class="badge badge-valid">${t.labelValid}</span>`;
  const typeBadge=a.type==='Multicast'?`<span class="badge badge-multi">${t.labelMulticast}</span>`:`<span class="badge badge-uni">${t.labelUnicast}</span>`;
  const adminBadge=a.admin_type==='LAA'?`<span class="badge badge-laa">${t.labelLAA}</span>`:`<span class="badge badge-uaa">${t.labelUAA}</span>`;
  const regBadge=a.registered?`<span class="badge badge-reg">${t.labelRegistered}</span>`:`<span class="badge badge-noreg">${t.labelUnregistered}</span>`;
  if(!a.organisation_name){
    return`<tr><td class="${macClass}">${esc(macDisplay)}</td><td>${validBadge}</td><td>${typeBadge}</td><td>${adminBadge}</td><td>${regBadge}</td><td colspan="4" class="td-noreg-msg">⊘ &nbsp;${esc(t.notRegMsg)}</td></tr>`;
  }
  const org=`<span class="cell-main accent">${esc(a.organisation_name||'—')}</span>${a.organization_address?`<span class="cell-sub">${esc(a.organization_address)}</span>`:''}`;
  const country=a.country_code?`<span class="cell-main muted">${esc(a.country_code.toUpperCase())}</span>`:'—';
  const detailLine=`<div class="detail-line">`+
    (a.oui?`<span class="detail-seg"><span class="detail-lbl">OUI</span><span class="detail-val">${esc(a.oui)}</span></span>`:'—')+
    (a.address_min&&a.address_max?`<span class="detail-seg"><span class="detail-lbl">Range</span><span class="detail-val">${esc(a.address_min)}</span><span class="detail-lbl"> → </span><span class="detail-val">${esc(a.address_max)}</span></span>`:'')+
    (a.block_size!=null?`<span class="detail-seg"><span class="detail-lbl">Block</span><span class="detail-val">${a.block_size.toLocaleString()}</span></span>`:'')+
  `</div>`;
  return`<tr><td class="${macClass}">${esc(macDisplay)}</td><td>${validBadge}</td><td>${typeBadge}</td><td>${adminBadge}</td><td>${regBadge}</td><td>${org}</td><td>${country}</td><td>${assignPill(a.assignment)}</td><td>${virtualChip(a.virtual)}</td></tr>`+
    `<tr class="row-detail"><td colspan="9">${detailLine}</td></tr>`;
}

function renderError(err,macs,elapsed){
  const panel=document.getElementById('results-panel'),body=document.getElementById('results-body');
  const t=LANGS[currentLang]||LANGS.en;panel.style.display='block';
  body.innerHTML=`<div class="result-meta"><span class="badge badge-error">${t.errBadge}</span><span class="result-query-str">${esc(macs.join(', '))}</span><span class="result-time">${elapsed}s</span></div><div class="raw-block" role="alert" style="color:var(--err)">${esc(String(err))}</div>`;
  document.getElementById('stats-bar').style.display='none';finalize(panel);
}

// ── CSV EXPORT ─────────────────────────────────────────────────────
function copyCSV(){
  const t=LANGS[currentLang]||LANGS.en;
  const hdr='mac|valid|type|admin_type|registered|oui|organisation_name|organization_address|country_code|assignment|virtual|block_size|address_min|address_max';
  const rows=lastAnswers.map(a=>{
    if(!a.valid)return[a.mac,'false','','','false','','','','','','','','',''].join('|');
    return[a.mac,a.valid,a.type,a.admin_type||'',a.registered,a.oui||'',a.organisation_name||'',a.organization_address||'',a.country_code||'',a.assignment||'',a.virtual||'',a.block_size!=null?a.block_size:'',a.address_min||'',a.address_max||''].join('|');
  });
  const csv=[hdr,...rows].join('\r\n');
  navigator.clipboard.writeText(csv).then(()=>{
    const b=document.getElementById('btn-csv');const l=document.getElementById('csv-label');if(!b)return;
    b.classList.add('copied');l.textContent=t.btnCopied;
    setTimeout(()=>{b.classList.remove('copied');l.textContent=t.btnCopy},2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=csv;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy')}catch(_){}document.body.removeChild(ta);
  });
}
function finalize(panel){panel.scrollIntoView({behavior:'smooth',block:'nearest'});panel.setAttribute('tabindex','-1');panel.focus({preventScroll:true})}
</script>
